# Helmsman marketing site — static Astro served by nginx.
#
# Apply once; thereafter the `marketing-build` workflow keeps it current via
#   kubectl rollout restart deployment/helmsman-marketing -n default
#
# Apply:  kubectl apply -f deploy/k8s/marketing.yaml
#
# An Ingress is intentionally left out (depends on your domain + ingress-nginx
# + cert-manager setup); a TLS'd example is commented at the bottom.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: helmsman-marketing
  namespace: default
  labels:
    app: helmsman-marketing
spec:
  replicas: 2
  selector:
    matchLabels:
      app: helmsman-marketing
  template:
    metadata:
      labels:
        app: helmsman-marketing
    spec:
      containers:
        - name: web
          image: ghcr.io/tyrelchambers/helmsman-marketing:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
---
apiVersion: v1
kind: Service
metadata:
  name: helmsman-marketing
  namespace: default
  labels:
    app: helmsman-marketing
spec:
  selector:
    app: helmsman-marketing
  ports:
    - name: http
      port: 80
      targetPort: 80
