# Default values for helmsman-web.
# Helmsman is an admin tool: it reads everything and (through a confirm gate)
# can mutate/install/delete across the cluster. Protect it with `auth.token`
# and don't expose it publicly without TLS + ideally an OIDC proxy.

image:
  # Built + pushed by .github/workflows/web-build.yml (ghcr.io/<owner>/helmsman-web).
  repository: ghcr.io/tyrelchambers/helmsman-web
  tag: latest
  pullPolicy: IfNotPresent
imagePullSecrets: []

replicaCount: 1

# -- Cluster access. In-cluster, the pod's ServiceAccount is used: the entrypoint
# synthesizes a kubeconfig from the mounted SA token (no kubeconfig needed).
# To target a DIFFERENT/remote cluster instead, mount a kubeconfig Secret and
# set kubeconfig.secretName (KUBECONFIG is pointed at it and the SA is ignored).
kubeconfig:
  # Name of a Secret with a `config` key holding a kubeconfig file. Empty = use
  # the in-cluster ServiceAccount.
  secretName: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}

rbac:
  create: true
  # Helmsman installs arbitrary Helm charts / applies manifests / deletes any
  # resource on request, so to be FULLY functional it needs cluster-admin.
  # `true` binds the SA to the built-in cluster-admin ClusterRole.
  # Set `false` to bind your own (byoClusterRole) or to run read-mostly.
  clusterAdmin: true
  # When clusterAdmin is false, bind to this existing ClusterRole instead.
  byoClusterRole: ""

# -- App auth. Helmsman can scale/delete/install cluster-wide, so it ships
# SECURE BY DEFAULT: a built-in browser login (admin password → httpOnly session
# cookie, which also covers the WebSocket). If you set nothing here, the chart
# GENERATES a random password into a Secret — retrieve it from the install notes.
auth:
  # Choose your own admin password (else one is generated and persisted).
  password: ""
  # Bring your own Secret instead (keys: HELMSMAN_PASSWORD, optional HELMSMAN_TOKEN).
  existingSecret: ""
  # Explicit opt-out: run with NO auth. ONLY for a fully trusted/private network —
  # anyone who reaches it can run cluster-admin commands.
  disable: false
  # Optional bearer token for non-browser/CLI callers (Authorization: Bearer …).
  # The browser UI does not use this; the password above protects the UI.
  token: ""
  # Fix the session-signing secret to keep logins valid across restarts/replicas
  # (else a random one is generated per pod). Optional.
  sessionSecret: ""

# -- AI (chat copilot). The `claude` CLI needs a subscription OAuth token from
# `claude setup-token`. Panels work without it; chat does not. Can also be set
# later from the in-app Settings screen (persisted to the claude volume).
claude:
  token: ""                   # inline → templated into a Secret
  existingSecret: ""          # Secret with key CLAUDE_CODE_OAUTH_TOKEN
  existingSecretKey: CLAUDE_CODE_OAUTH_TOKEN

# -- Writable home for the `claude` CLI (session-env, history). MUST be writable
# or the chat's tools break. emptyDir by default; set persistence.enabled for a PVC.
claudeHome:
  persistence:
    enabled: false
    size: 1Gi
    storageClass: ""

service:
  type: ClusterIP
  port: 8787

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: helmsman.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 1Gi

# The image runs as root (its tools live under /root). Override at your own risk;
# the claude home + /tmp must stay writable by the runtime user.
podSecurityContext: {}
securityContext: {}

nodeSelector: {}
tolerations: []
affinity: {}
podAnnotations: {}
