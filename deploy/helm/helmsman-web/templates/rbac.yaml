{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "helmsman-web.fullname" . }}
  labels:
    {{- include "helmsman-web.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  {{- if .Values.rbac.clusterAdmin }}
  # Helmsman installs charts / applies manifests / deletes arbitrary resources
  # on confirmed request — full functionality requires cluster-admin. Gate access
  # with auth.token + network controls instead of narrowing this.
  name: cluster-admin
  {{- else if .Values.rbac.byoClusterRole }}
  name: {{ .Values.rbac.byoClusterRole }}
  {{- else }}
  name: view
  {{- end }}
subjects:
  - kind: ServiceAccount
    name: {{ include "helmsman-web.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
