apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "helmsman-web.fullname" . }}
  labels:
    {{- include "helmsman-web.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "helmsman-web.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "helmsman-web.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "helmsman-web.serviceAccountName" . }}
      # The server uses the SA token (via the entrypoint-generated kubeconfig).
      automountServiceAccountToken: true
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: helmsman-web
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: 8787
          env:
            {{- if .Values.kubeconfig.secretName }}
            # Target a specific (possibly remote) cluster from a mounted kubeconfig.
            - name: KUBECONFIG
              value: /kube/config
            {{- end }}
            {{- if or (not .Values.auth.disable) .Values.auth.existingSecret }}
            - name: HELMSMAN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "helmsman-web.authSecretName" . }}
                  key: HELMSMAN_PASSWORD
                  optional: true
            {{- end }}
            - name: HELMSMAN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "helmsman-web.authSecretName" . }}
                  key: HELMSMAN_TOKEN
                  optional: true
            - name: HELMSMAN_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "helmsman-web.authSecretName" . }}
                  key: HELMSMAN_SESSION_SECRET
                  optional: true
            {{- if or .Values.claude.token .Values.claude.existingSecret }}
            - name: CLAUDE_CODE_OAUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "helmsman-web.claudeSecretName" . }}
                  key: {{ .Values.claude.existingSecretKey }}
                  optional: true
            {{- end }}
          volumeMounts:
            # `claude` CLI runtime state — MUST be writable or chat tools break.
            - name: claude-home
              mountPath: /root/.claude
            - name: tmp
              mountPath: /tmp
            {{- if .Values.kubeconfig.secretName }}
            - name: kubeconfig
              mountPath: /kube
              readOnly: true
            {{- end }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: claude-home
          {{- if .Values.claudeHome.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "helmsman-web.fullname" . }}-claude
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: tmp
          emptyDir: {}
        {{- if .Values.kubeconfig.secretName }}
        - name: kubeconfig
          secret:
            secretName: {{ .Values.kubeconfig.secretName }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
