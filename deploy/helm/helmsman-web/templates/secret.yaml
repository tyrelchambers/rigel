{{- if not .Values.auth.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "helmsman-web.fullname" . }}-auth
  labels:
    {{- include "helmsman-web.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if not .Values.auth.disable }}
  HELMSMAN_PASSWORD: {{ include "helmsman-web.password" . | quote }}
  {{- end }}
  {{- if .Values.auth.token }}
  HELMSMAN_TOKEN: {{ .Values.auth.token | quote }}
  {{- end }}
  {{- if .Values.auth.sessionSecret }}
  HELMSMAN_SESSION_SECRET: {{ .Values.auth.sessionSecret | quote }}
  {{- end }}
{{- end }}
{{- if and .Values.claude.token (not .Values.claude.existingSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "helmsman-web.fullname" . }}-claude
  labels:
    {{- include "helmsman-web.labels" . | nindent 4 }}
type: Opaque
stringData:
  CLAUDE_CODE_OAUTH_TOKEN: {{ .Values.claude.token | quote }}
{{- end }}
