# Example shape of the synapse-config Secret. The real Secret is created out-of-band
# (never commit real secrets). It is built with:
#
#   kubectl create secret generic synapse-config -n personal \
#     --from-file=homeserver.yaml=... \
#     --from-file=log.config=... \
#     --from-file=signing.key=...
#
# homeserver.yaml holds the DB password + registration_shared_secret + macaroon_secret_key
# + form_secret; signing.key is the server's ed25519 identity (persist it — losing it
# breaks the homeserver). See docs/superpowers/plans/2026-06-26-matrix-homeserver.md.
apiVersion: v1
kind: Secret
metadata:
  name: synapse-config
  namespace: personal
type: Opaque
stringData:
  signing.key: |
    ed25519 a_REPLACE REPLACE_ME_BASE64
  log.config: |
    version: 1
    root: { level: INFO, handlers: [console] }
    handlers: { console: { class: logging.StreamHandler, formatter: precise } }
    formatters: { precise: { format: '%(asctime)s %(levelname)s %(name)s %(message)s' } }
    disable_existing_loggers: false
  homeserver.yaml: |
    server_name: "matrix.tail8a13da.ts.net"
    public_baseurl: "https://matrix.tail8a13da.ts.net/"
    pid_file: /data/homeserver.pid
    signing_key_path: "/config/signing.key"
    log_config: "/config/log.config"
    media_store_path: "/data/media_store"
    report_stats: false
    enable_registration: false
    federation_domain_whitelist: []
    trusted_key_servers: []
    user_directory:
      enabled: true
      search_all_users: true
      prefer_local_users: true
    listeners:
      - port: 8008
        tls: false
        type: http
        x_forwarded: true
        bind_addresses: ['0.0.0.0']
        resources:
          - names: [client]
            compress: false
    database:
      name: psycopg2
      args:
        user: synapse
        password: "REPLACE_ME"
        database: synapse
        host: postgres-rw.default.svc.cluster.local
        port: 5432
        cp_min: 5
        cp_max: 10
    registration_shared_secret: "REPLACE_ME"
    macaroon_secret_key: "REPLACE_ME"
    form_secret: "REPLACE_ME"
