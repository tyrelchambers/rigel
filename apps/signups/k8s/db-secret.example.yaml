# Template only — create the real Secret with `kubectl create secret` (Task 8 Step 3).
apiVersion: v1
kind: Secret
metadata:
  name: rigel-signups
  namespace: default
stringData:
  DATABASE_URL: postgres://rigel_app:CHANGEME@<cnpg-cluster>-rw.default.svc:5432/rigel
  APP_KEY: CHANGEME
  # Optional Kit (ConvertKit) sync. Without KIT_API_KEY the service still captures
  # signups to Postgres but creates no Kit subscriber (kit.ts returns a no-op).
  KIT_API_KEY: CHANGEME
  KIT_TAG_ID: "CHANGEME"   # numeric Kit tag id (waitlist tag = 20502352); omit to skip tagging
