server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Compress text assets on the fly.
  gzip on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml font/woff2;

  # Fingerprinted build assets (Astro emits these under /_astro) are immutable.
  location /_astro/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Fonts are content-hashed too.
  location ~* \.woff2$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Serve clean URLs; fall through to the static 404 page.
  location / {
    try_files $uri $uri/ $uri.html =404;
  }

  error_page 404 /404.html;
}
