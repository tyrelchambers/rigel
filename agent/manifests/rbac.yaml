# ─────────────────────────────────────────────────────────────────────────────
# The RBAC cage. This is what makes "destructive actions are blocked entirely"
# TRUE at the cluster level — not a prompt the model could talk its way past.
#
# The agent can read broadly for diagnosis (EXCEPT secrets) and perform exactly
# the narrow set of safe mutations that back the LOW/MEDIUM action kinds. Every
# destructive verb is simply absent, so the API server itself refuses them:
#   - NO verbs on secrets (no value exfiltration)
#   - NO delete on namespaces / persistentvolumeclaims / persistentvolumes
#   - NO create on pods/eviction (so `kubectl drain` cannot work)
#   - NO verbs on roles / rolebindings / clusterroles (no self-escalation)
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rigel-assistant
  namespace: default
  labels:
    app.kubernetes.io/name: rigel-assistant
    app.kubernetes.io/managed-by: rigel-assistant
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: rigel-assistant
  labels:
    app.kubernetes.io/managed-by: rigel-assistant
rules:
  # ── broad read for diagnosis — secrets deliberately omitted ──
  - apiGroups: [""]
    resources:
      [pods, pods/log, nodes, events, namespaces, services, endpoints,
       persistentvolumeclaims, persistentvolumes, replicationcontrollers, configmaps]
    verbs: [get, list, watch]
  - apiGroups: ["apps"]
    resources: [deployments, replicasets, statefulsets, daemonsets]
    verbs: [get, list, watch]
  - apiGroups: ["batch"]
    resources: [jobs, cronjobs]
    verbs: [get, list, watch]
  - apiGroups: ["events.k8s.io"]
    resources: [events]
    verbs: [get, list, watch]
  - apiGroups: ["metrics.k8s.io"]
    resources: [pods, nodes]
    verbs: [get, list]
  # ── narrow mutations: exactly the LOW/MEDIUM action surface, nothing else ──
  - apiGroups: ["apps"]
    resources: [deployments]
    verbs: [patch, update] # restart, setEnv, rollback
  - apiGroups: ["apps"]
    resources: [deployments/scale]
    verbs: [patch, update] # scale
  - apiGroups: [""]
    resources: [pods]
    verbs: [delete] # delete a crashlooping/stuck pod (controller recreates it)
  - apiGroups: [""]
    resources: [nodes]
    verbs: [patch] # cordon / uncordon (.spec.unschedulable)
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: rigel-assistant
  labels:
    app.kubernetes.io/managed-by: rigel-assistant
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: rigel-assistant
subjects:
  - kind: ServiceAccount
    name: rigel-assistant
    namespace: default
---
# Namespaced role for the agent's OWN state ConfigMaps. Scoped by resourceNames
# to the three assistant ConfigMaps; no `create` needed because the install
# pre-creates them empty (see configmaps.yaml).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: rigel-assistant-state
  namespace: default
  labels:
    app.kubernetes.io/managed-by: rigel-assistant
rules:
  - apiGroups: [""]
    resources: [configmaps]
    resourceNames: [assistant-config, assistant-state, assistant-backups]
    verbs: [get, update, patch]
  # Fix-PR orchestration. For each approved openFixPR the agent creates a per-fix
  # `rigel-fix-<id>` ConfigMap (the fix spec) + a one-shot Job that opens the PR.
  # `create` carries no object name yet, so it can't be resourceName-scoped — this
  # is ns-scoped to the state namespace instead. (get/list/watch on configmaps and
  # jobs are already granted cluster-wide by the ClusterRole above for diagnosis;
  # listed here too so the namespaced role is self-describing.)
  - apiGroups: [""]
    resources: [configmaps]
    verbs: [create, delete]
  - apiGroups: ["batch"]
    resources: [jobs]
    verbs: [create, delete, get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rigel-assistant-state
  namespace: default
  labels:
    app.kubernetes.io/managed-by: rigel-assistant
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: rigel-assistant-state
subjects:
  - kind: ServiceAccount
    name: rigel-assistant
    namespace: default
---
# ─────────────────────────────────────────────────────────────────────────────
# The fix-runner Job's ServiceAccount. The other half of the privilege split:
# this SA holds the GitHub token (mounted from the `rigel-github` Secret) but has
# ZERO cluster access — DELIBERATELY no Role/RoleBinding/ClusterRoleBinding. A
# fix Job only uses its mounted Secret + per-fix ConfigMap and outbound git/HTTPS
# to open a PR; it never talks to the API server (its pod even sets
# automountServiceAccountToken: false). So the token-holding pod can't touch the
# cluster, and the cluster-capable agent never holds the token.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rigel-fix-runner
  namespace: default
  labels:
    app.kubernetes.io/name: rigel-fix-runner
    app.kubernetes.io/managed-by: rigel-assistant
automountServiceAccountToken: false
