# TEMPLATE ONLY — do not commit a real token. Rigel's installer creates this
# Secret for you from the output of `claude setup-token` run on your Mac.
#
# Manual equivalent:
#   TOKEN=$(claude setup-token)   # run on a machine logged into your Max plan
#   kubectl create secret generic assistant-claude-token \
#     -n default --from-literal=token="$TOKEN"
apiVersion: v1
kind: Secret
metadata:
  name: assistant-claude-token
  namespace: default
  labels:
    app.kubernetes.io/managed-by: rigel-assistant
type: Opaque
stringData:
  token: "REPLACE_WITH_claude_setup-token_OUTPUT"
