name: Release versioned images

# When a GitHub Release is PUBLISHED (from a vX.Y.Z tag — see desktop-release.yml
# + RELEASING.md), build and push the deployable images tagged with that semver
# so self-hosters can pin a stable version. Each image gets :X.Y.Z (exact pin),
# :X.Y (minor track), and a moving :stable (always the latest published release).
#
# This does NOT deploy to any cluster — continuous deploy still runs from master
# (see agent-build.yml / marketing-build.yml / signups-build.yml, which pin the
# per-commit :<sha>). Use "Run workflow" with an explicit version to re-push.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Semver to tag, e.g. 1.2.3 (no leading v)"
        required: true

permissions:
  contents: read
  packages: write

jobs:
  images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: rigel-assistant
            # Repo root: the image bundles agent/ + the shared packages/k8s/ source.
            context: .
            file: ./agent/Dockerfile
          - name: rigel-marketing
            context: .
            file: ./apps/marketing/Dockerfile
          - name: rigel-signups
            context: .
            file: ./apps/signups/Dockerfile
    steps:
      - uses: actions/checkout@v5

      # No QEMU: build natively for amd64. The agent image bakes an AVX2 Bun that
      # segfaults if built under emulation; all cluster nodes are amd64.
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version + semver tags
        id: tags
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            V="${{ github.event.inputs.version }}"
          else
            V="${{ github.event.release.tag_name }}"
          fi
          V="${V#v}"
          if ! printf '%s' "$V" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::'$V' is not a semver version (expected X.Y.Z)"; exit 1
          fi
          IMG="ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}"
          MM="${V%.*}"
          {
            echo "list<<EOF"
            echo "$IMG:$V"
            echo "$IMG:$MM"
            echo "$IMG:stable"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "::notice::$IMG → $V, $MM, stable"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.list }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
