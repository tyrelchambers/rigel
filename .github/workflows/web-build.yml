name: Build Helmsman web image

on:
  push:
    branches: [master]
    paths:
      - "apps/**"
      - "packages/**"
      - "Dockerfile"
      - ".github/workflows/web-build.yml"
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/helmsman-web

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      # Build natively for amd64 (no QEMU): claude-code's installer bakes an
      # AVX2 Bun on the runner; under emulation it bakes the baseline build that
      # segfaults. All target nodes are amd64. (Same reasoning as agent-build.)
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # NOTE: a `deploy` job (1Password kubeconfig -> Tailscale -> kubectl rollout
  # restart deployment/helmsman-web -n default) is appended once the in-cluster
  # manifests + RBAC + claude-token Secret are decided.
