name: Publish Helm chart

# Deliberate chart releases: push a tag like `chart-v0.1.0`. The packaged chart
# is pushed as an OCI artifact to GHCR (same registry as the image), so users
# can install without cloning:
#   helm install hm oci://ghcr.io/<owner>/charts/helmsman-web --version 0.1.0
on:
  push:
    tags:
      - "chart-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Chart version to package (e.g. 0.1.0)"
        required: true

env:
  CHART_DIR: deploy/helm/helmsman-web

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      # All ${{ }} values flow through env vars (never inlined into run:) and are
      # used quoted, so a crafted input can't inject shell.
      - name: Resolve version
        id: ver
        env:
          EVENT: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT" = "workflow_dispatch" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION="${REF_NAME#chart-v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Lint
        run: helm lint "$CHART_DIR"

      - name: Log in to GHCR
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        run: printf '%s' "$GHCR_TOKEN" | helm registry login ghcr.io -u "$GHCR_USER" --password-stdin

      - name: Package + push (OCI)
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          OWNER: ${{ github.repository_owner }}
        run: |
          helm package "$CHART_DIR" --version "$VERSION" -d /tmp/chart
          helm push /tmp/chart/helmsman-web-*.tgz "oci://ghcr.io/$OWNER/charts"
