name: Build Rigel marketing image

on:
  push:
    branches: [master]
    paths:
      - "apps/marketing/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/marketing-build.yml"
  # A published desktop release rebakes the download page's static asset links.
  # `released` fires on publish (not on the draft electron-builder uploads).
  release:
    types: [released]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/rigel-marketing

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/marketing/Dockerfile
          push: true
          # The download page resolves the latest release at build time; pass the
          # Actions token so that API call is authenticated (60→5000/hr).
          build-args: |
            GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      # The rollout step applies manifests from the repo (apps/marketing/k8s),
      # so the deploy job needs the source checked out — without this the apply
      # fails with "path ... does not exist" and the rollout never runs.
      - uses: actions/checkout@v5

      - name: Load kubeconfig from 1Password
        uses: 1password/load-secrets-action@v3
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          KUBECONFIG_B64: op://App Secrets/Kubeconfig/notesPlain

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Set up kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "$KUBECONFIG_B64" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Apply manifests and roll out
        run: |
          # Create/update the Deployment + Service (idempotent — works on the
          # first deploy and every subsequent one). The Ingress is intentionally
          # left out: it depends on the domain + ingress-nginx/cert-manager, so
          # it's applied manually from apps/marketing/k8s/ingress.yaml when ready.
          kubectl apply -f apps/marketing/k8s/deployment.yaml -f apps/marketing/k8s/service.yaml
          # Pin to the immutable per-commit tag so the node actually pulls this
          # build (and the deploy is traceable + rollback-able), instead of relying
          # on a :latest re-pull.
          kubectl set image deployment/rigel-marketing web=${{ env.IMAGE }}:${{ github.sha }} -n default
          kubectl rollout status deployment/rigel-marketing -n default --timeout=120s
